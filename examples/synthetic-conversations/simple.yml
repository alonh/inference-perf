# Simple synthetic conversational session replay example.
#
# Generates conversations in memory and replays them directly as ReplayGraphs.
# Good for quick local validation of the synthetic session replay path.
#
# Usage:
#   python -m inference_perf.main --config examples/synthetic-conversations/simple.yml

api:
  type: chat
  streaming: true

tokenizer:
  pretrained_model_name_or_path: "HuggingFaceTB/SmolLM2-135M-Instruct"

data:
  type: synthetic_conversational_session_replay
  synthetic_conversational_session_replay:
    seed: 42
    num_conversations: 10
    shared_system_prompt_len: 20
    dynamic_system_prompt_len:
      type: normal
      min: 10
      max: 20
      mean: 15
      std_dev: 1
    turns_per_conversation:
      type: lognormal
      min: 4
      max: 4
      mean: 4
      std_dev: 3
    input_tokens_per_turn:
      type: normal
      min: 5
      max: 5
      mean: 5
      std_dev: 2
    output_tokens_per_turn:
      type: normal
      min: 10
      max: 10
      mean: 10
      std_dev: 2
    inter_turn_wait_ms:
      type: fixed
      min: 100
      max: 100
      mean: 100
      std_dev: 0
    model_name: "HuggingFaceTB/SmolLM2-135M-Instruct"

load:
  type: trace_session_replay
  stages:
    - concurrent_sessions: 10
      num_sessions: 10
  num_workers: 8
  worker_max_concurrency: 400

server:
  type: vllm
  base_url: "http://localhost:8000"
  model_name: "HuggingFaceTB/SmolLM2-135M-Instruct"

report:
  request_lifecycle:
    summary: true
    per_stage: true
    per_request: false

