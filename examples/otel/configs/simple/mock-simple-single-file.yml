# OTel Trace Replay Configuration for Testing with a Single File
# This config demonstrates using trace_file instead of trace_directory

api:
  type: chat
  streaming: false

data:
  type: otel_trace_replay
  otel_trace_replay:
    # Use a single specific trace file instead of a directory
    trace_file: "examples/otel/test_traces/simple/simple_chain.json"

    # Model configuration
    use_static_model: true
    static_model_name: "HuggingFaceTB/SmolLM2-135M-Instruct"

    # Request settings
    default_max_tokens: 50

    # Dependency settings
    dependency_window_ms: 120000
    include_errors: false
    skip_invalid_files: true
    validate_dependencies: true

load:
  type: trace_session_replay  # Session-based replay
  stages:
    - concurrent_sessions: 1  # Sequential execution
  num_workers: 1  # Single worker to avoid deadlocks with dependency blocking
  worker_max_concurrency: 10

server:
  type: mock
  base_url: "http://localhost:8000"
  model_name: "test-model"

storage:
  local_storage:
    path: "reports-otel-single-file-test"

report:
  request_lifecycle:
    summary: true
    per_stage: false
    per_request: false

