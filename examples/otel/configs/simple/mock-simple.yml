# Simplified OTel Trace Replay Configuration for Testing
# Single worker, single session, short duration

api:
  type: chat
  streaming: false

data:
  type: otel_trace_replay
  otel_trace_replay:
    # Use only simple_chain.json for testing
    trace_directory: "examples/otel/test_traces/simple"
    
    # Single session, no concurrency
    concurrent_sessions: 1
    session_start_delay_sec: 0.0
    time_scale: 1.0  # Real-time for easier debugging
    
    # Model configuration
    use_static_model: true
    static_model_name: "test-model"
    
    # Request settings
    default_max_tokens: 50
    
    # Dependency settings
    dependency_window_ms: 120000
    max_dependencies_per_event: 3
    include_errors: false
    skip_invalid_files: true
    validate_dependencies: true

load:
  type: constant
  stages:
    - rate: 1.0  # 1 request per second
      duration: 5  # 5 seconds total
  num_workers: 1  # Single worker to avoid deadlock
  worker_max_concurrency: 1

server:
  type: mock
  base_url: "http://localhost:8000"
  model_name: "test-model"

storage:
  local_storage:
    path: "reports-otel-simple-test"

report:
  request_lifecycle:
    summary: true
    per_stage: false
    per_request: false

