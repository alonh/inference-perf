# OTel Trace Replay Configuration with Mock Server
# This configuration tests the full replay flow without requiring a real inference server

api:
  type: chat
  streaming: false

data:
  type: otel_trace_replay
  otel_trace_replay:
    # Directory containing OTel JSON trace files
    trace_directory: "examples/trace-replay/otel/test_traces/simple"
    
    # Concurrency settings - test with just 1 session for simplicity
    concurrent_sessions: 1
    session_start_delay_sec: 0.0
    time_scale: 1.0  # Real-time to avoid deadlocks with dependency waiting
    
    # Model configuration - use static model
    use_static_model: true
    static_model_name: "test-model"
    
    # Request settings
    default_max_tokens: 100
    
    # Dependency inference settings
    dependency_window_ms: 120000
    max_dependencies_per_event: 3
    
    # Error handling
    include_errors: true
    skip_invalid_files: true
    validate_dependencies: true

load:
  type: constant
  stages:
    - rate: 1.0  # 1 request/sec for real-time replay
      duration: 1  # 10 seconds
  num_workers: 1  # Single worker to avoid deadlocks with dependency blocking
  worker_max_concurrency: 1

server:
  type: vllm  # Use mock server for testing
  base_url: "http://localhost:8000"
  model_name: "HuggingFaceTB/SmolLM2-135M-Instruct"

storage:
  local_storage:
    path: "reports-otel-trace-replay-mock"

report:
  request_lifecycle:
    summary: true
    per_stage: true
    per_request: false

