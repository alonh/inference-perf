# OTel Trace Replay Configuration Example
# This configuration replays LLM requests from OpenTelemetry trace files

api:
  type: chat
  streaming: false

data:
  type: otel_trace_replay
  otel_trace_replay:
    # Directory containing OTel JSON trace files
    trace_directory: "examples/otel/test_traces/advanced"
    
    # Concurrency settings
    concurrent_sessions: 2  # Run 2 sessions in parallel (0 = all sessions concurrently)
    session_start_delay_sec: 5.0  # 5 second delay between session batches
    time_scale: 1.0  # Real-time replay (0.5 = half speed, 2.0 = double speed)
    
    # Model configuration - Option 1: Use static model for all requests
    use_static_model: true
    static_model_name: "meta-llama/Llama-3.1-8B-Instruct"
    
    # Model configuration - Option 2: Use model mapping (comment out use_static_model above)
    # use_static_model: false
    # model_mapping:
    #   "gpt-4": "meta-llama/Llama-3.1-70B-Instruct"
    #   "gpt-3.5-turbo": "meta-llama/Llama-3.1-8B-Instruct"
    #   "claude-haiku-4-5-20251001": "meta-llama/Llama-3.1-8B-Instruct"
    
    # Request settings
    default_max_tokens: 1000  # Default if not specified in trace
    
    # Dependency inference settings
    dependency_window_ms: 120000  # 2 minute window for dependency inference
    max_dependencies_per_event: 3  # Max dependencies per request
    
    # Error handling
    include_errors: true  # Include spans with error status
    skip_invalid_files: true  # Skip invalid trace files instead of failing
    validate_dependencies: true  # Validate dependency graph and log warnings

load:
  type: constant
  stages:
    - rate: 1.0  # Requests per second (adjust based on trace replay needs)
      duration: 300  # Duration in seconds
  num_workers: 1
  worker_max_concurrency: 100

server:
  type: vllm
  base_url: "http://localhost:8000"
  model_name: "HuggingFaceTB/SmolLM2-135M-Instruct"
  ignore_eos: true

tokenizer:
  pretrained_model_name_or_path: "HuggingFaceTB/SmolLM2-135M-Instruct"
  trust_remote_code: true

storage:
  local_storage:
    path: "reports-otel-trace-replay"

report:
  request_lifecycle:
    summary: true
    per_stage: true
    per_request: false

