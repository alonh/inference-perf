# OTel Trace Replay with Session-Based Load Configuration
# This demonstrates the new TRACE_SESSION_REPLAY load type which dispatches
# entire trace sessions instead of individual events.

api:
  type: chat
  streaming: false

data:
  type: otel_trace_replay
  otel_trace_replay:
    trace_directory: "examples/otel/test_traces/advanced"
    
    # Session configuration
    concurrent_sessions: 0  # 0 = replay all sessions (controlled by load config)
    session_start_delay_sec: 0.0
    time_scale: 1.0  # Real-time replay
    
    # Model configuration
    use_static_model: true
    static_model_name: "HuggingFaceTB/SmolLM2-135M-Instruct"
    default_max_tokens: 100
    
    # Dependency settings
    dependency_window_ms: 120000
    max_dependencies_per_event: 3
    include_errors: false
    skip_invalid_files: true
    validate_dependencies: true

load:
  type: trace_session_replay  # Session-based replay
  stages:
    - session_rate: 1.0  # Start 1 session per second
      duration: 10       # For 10 seconds
      max_concurrent_sessions: 1  # Max 1 concurrent session
  num_workers: 1  # Single worker to avoid deadlocks with dependency blocking
  worker_max_concurrency: 10

server:
  type: vllm
  base_url: "http://localhost:8000"
  model_name: "HuggingFaceTB/SmolLM2-135M-Instruct"

tokenizer:
  pretrained_model_name_or_path: "HuggingFaceTB/SmolLM2-135M-Instruct"

storage:
  local_storage:
    path: "reports-otel-session-replay"

report:
  request_lifecycle:
    summary: true
    per_stage: true
    per_request: false

