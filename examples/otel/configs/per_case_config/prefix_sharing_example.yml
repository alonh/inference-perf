# Config for prefix_sharing_example.json - Prefix sharing test case

api:
  type: chat
  streaming: false

data:
  type: otel_trace_replay
  otel_trace_replay:
    trace_file: "examples/otel/test_traces/advanced/prefix_sharing_example.json"
    
    concurrent_sessions: 1
    session_start_delay_sec: 0.0
    time_scale: 1.0
    
    use_static_model: true
    static_model_name: "HuggingFaceTB/SmolLM2-135M-Instruct"
    
    default_max_tokens: 150
    
    dependency_window_ms: 120000
    max_dependencies_per_event: 3
    include_errors: false
    skip_invalid_files: true
    validate_dependencies: true

load:
  type: trace_session_replay
  stages:
    - num_sessions: 1
      max_concurrent_sessions: 1
  num_workers: 20
  worker_max_concurrency: 10

server:
  type: vllm
  base_url: "http://localhost:8000"
  model_name: "HuggingFaceTB/SmolLM2-135M-Instruct"

storage:
  local_storage:
    path: "reports-prefix-sharing"

report:
  request_lifecycle:
    summary: true
    per_stage: false
    per_request: false

